<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover でノッチ/ホームバー領域も使い、env(safe-area-inset-*) を有効化 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>カビ取りキング ～魔法の大聖堂～</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0e0a1e;
      overflow: hidden;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      overscroll-behavior: none;
    }

    /* 画面全体（実ビューポート）。高さはJSで window.innerHeight を反映してiOSのアドレスバー問題を回避。
       セーフエリア分だけ内側に寄せ、その内側(=#game-wrap)にCanvasを収める。 */
    #stage {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;          /* JSで実寸に上書き */
      height: 100dvh;          /* 対応ブラウザ向けフォールバック */
      background: #0e0a1e;
      /* ノッチは片側だけinsetが大きく非対称になり、Canvasが画面中央からずれる。
         左右(と上下)を「大きい方の値」で揃え、ノッチを避けつつ画面中央に対称配置する。 */
      --inset-x: max(env(safe-area-inset-left), env(safe-area-inset-right));
      --inset-y: max(env(safe-area-inset-top), env(safe-area-inset-bottom));
      padding: var(--inset-y) var(--inset-x);
    }

    /* Phaserの親。セーフエリア内いっぱい。CanvasをFITで中央に収める */
    #game-wrap {
      position: relative;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { display: block; max-width: 100%; max-height: 100%; }

    /* タッチUI（セーフエリア内に配置されるので端で途切れない） */
    #touch-ui {
      position: absolute;
      inset: max(env(safe-area-inset-top), env(safe-area-inset-bottom))
             max(env(safe-area-inset-left), env(safe-area-inset-right));
      pointer-events: none;
      display: none;            /* タッチ端末のみ表示 */
      z-index: 10;
    }
    body.touch #touch-ui { display: block; }
    .tbtn {
      position: absolute;
      pointer-events: auto;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.3vmin;
      color: #fff; font-weight: 800;
      background: rgba(80, 90, 160, 0.45);
      border: 3px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      width: 15vmin; height: 15vmin;
      user-select: none;
      backdrop-filter: blur(2px);
      transition: transform .06s, background .08s;
    }
    .tbtn:active { transform: scale(0.93); }
    /* アイコンを主役に大きく。視界の端でも形で識別できるようはっきりしたシルエット */
    .tbtn .ic { width: 8.5vmin; height: 8.5vmin; display: flex; }
    .tbtn .ic svg { width: 100%; height: 100%; display: block;
      filter: drop-shadow(0 0.4vmin 0.4vmin rgba(0,0,0,0.45)); }
    .tbtn .lbl { font-size: 2.7vmin; line-height: 1; letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
    /* 横持ち基準。vmin(=短辺=高さ)基準なので画面下部に確実に収まる */
    /* JUMP=緑＋上矢印 / 魔法=紫＋キラキラ。形と色の両方で直感的に区別 */
    #btn-jump  { left: 3vmin;  bottom: 3vmin; width: 19vmin; height: 19vmin;
                 background: rgba(46,168,96,0.6); border-color: rgba(190,255,210,0.85); }
    #btn-jump:active  { background: rgba(70,210,130,0.85); }
    #btn-fire  { right: 3vmin; bottom: 3vmin; width: 21vmin; height: 21vmin;
                 background: rgba(170,82,205,0.6); border-color: rgba(240,205,255,0.85); }
    #btn-fire:active  { background: rgba(205,110,245,0.85); }
    #btn-fire .ic { width: 9.5vmin; height: 9.5vmin; }

    /* 縦持ち案内オーバーレイ（横スクロールゲームなので横持ち推奨） */
    #rotate-hint {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: radial-gradient(circle at 50% 40%, #2a2150, #0e0a1e 80%);
      color: #fff; text-align: center;
      align-items: center; justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    body.portrait #rotate-hint { display: flex; }
    .rh-icon {
      font-size: 64px; line-height: 1;
      display: inline-block;
      animation: rh-rotate 1.8s ease-in-out infinite;
    }
    @keyframes rh-rotate {
      0%, 40%   { transform: rotate(0deg); }
      60%, 100% { transform: rotate(90deg); }
    }
    .rh-title { margin-top: 22px; font-size: 26px; font-weight: 700; color: #ffe27a; }
    .rh-sub   { margin-top: 12px; font-size: 16px; line-height: 1.7; color: #cfd6ff; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="game-wrap"></div>
    <div id="touch-ui">
      <!-- JUMP: 太い上向き矢印（周辺視でも「上＝ジャンプ」と分かるシルエット） -->
      <div class="tbtn" id="btn-jump">
        <span class="ic" aria-hidden="true">
          <svg viewBox="0 0 100 100">
            <path d="M50 8 L90 50 H68 V92 H32 V50 H10 Z"
                  fill="#ffffff" stroke="#1c5c34" stroke-width="5" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="lbl">JUMP</span>
      </div>
      <!-- 魔法: キラキラ（4方向星＋小星）。矢印とは全く違う形で識別 -->
      <div class="tbtn" id="btn-fire">
        <span class="ic" aria-hidden="true">
          <svg viewBox="0 0 100 100">
            <path d="M50 18 C53 42 58 47 82 50 C58 53 53 58 50 82 C47 58 42 53 18 50 C42 47 47 42 50 18 Z"
                  fill="#ffffff" stroke="#5a1c70" stroke-width="4" stroke-linejoin="round"/>
            <path d="M80 12 C81 20 82 21 90 22 C82 23 81 24 80 32 C79 24 78 23 70 22 C78 21 79 20 80 12 Z"
                  fill="#fff3b0" stroke="#5a1c70" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="20" cy="78" r="4.5" fill="#fff3b0" stroke="#5a1c70" stroke-width="2.5"/>
          </svg>
        </span>
        <span class="lbl">魔法</span>
      </div>
    </div>
  </div>

  <!-- 縦持ち時の案内 -->
  <div id="rotate-hint">
    <div>
      <div class="rh-icon">📱</div>
      <div class="rh-title">横向きにしてください</div>
      <div class="rh-sub">スマホを横にすると<br>ゲーム画面が広く表示されます</div>
    </div>
  </div>

  <script>
    // iOS Safari のアドレスバーで 100vh がずれる問題に対応：
    // 実ビューポート高(window.innerHeight)を #stage の高さに反映する。
    (function () {
      var stage = document.getElementById("stage");
      function applyHeight() {
        stage.style.height = window.innerHeight + "px";
      }
      applyHeight();
      window.addEventListener("resize", applyHeight);
      window.addEventListener("orientationchange", function () {
        setTimeout(applyHeight, 250);
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", applyHeight);
      }
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
